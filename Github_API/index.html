<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <title>GitHub Felhasználó Keresés</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .user { margin: 10px 0; display: flex; align-items: center; }
    .user img { width: 50px; height: 50px; border-radius: 50%; margin-right: 10px; }
    nav a { margin-right: 15px; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">Kezdőlap</a>
    <a href="user-search.html">Felhasználó keresés</a>
  </nav>

  <h1>GitHub Felhasználó Keresés</h1>

  <input type="text" id="searchInput" placeholder="Felhasználónév" />
  <button onclick="searchUsers()">Keresés</button>

  <div id="results"></div>

  <script>
    async function searchUsers() {
      const query = document.getElementById('searchInput').value.trim();
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = ''; // Clear previous results

      if (!query) {
        alert('Kérlek, adj meg egy keresőkifejezést!');
        return;
      }

      try {
        const response = await fetch(`https://api.github.com/search/users?q=${encodeURIComponent(query)}`);
        const data = await response.json();

        if (data.items.length === 0) {
          resultsDiv.innerHTML = '<p>Nincs találat.</p>';
          return;
        }

        data.items.forEach(user => {
          const div = document.createElement('div');
          div.className = 'user';
          div.innerHTML = `
            <img src="${user.avatar_url}" alt="${user.login}">
            <a href="${user.html_url}" target="_blank">${user.login}</a>
          `;
          resultsDiv.appendChild(div);
        });
      } catch (error) {
        console.error('Hiba történt:', error);
        alert('Nem sikerült lekérdezni az adatokat.');
      }
    }
  </script>

</body>
</html>
